        async function salvarEcopiar() {
    const nome = document.getElementById('nome').value;
    const whatsapp = document.getElementById('whatsapp').value;

    if (!nome || !whatsapp) {
        alert("Por favor, preencha seu Nome e WhatsApp antes de copiar a chave.");
        return;
    }

    // Registra a intenção no Supabase antes de copiar
    try {
        await fetch(`${SUPABASE_URL}/rest/v1/pagamentos_sorteio`, {
            method: "POST",
            headers: {
                "apikey": SUPABASE_KEY,
                "Authorization": `Bearer ${SUPABASE_KEY}`,
                "Content-Type": "application/json",
                "Prefer": "return=representation"
            },
            body: JSON.stringify({
                nome: nome,
                whatsapp: whatsapp,
                status: "Manual" // Indica que o cliente escolheu o Pix manual
            })
        });
    } catch (error) {
        console.error("Erro ao registrar no Supabase:", error);
    }

    // Copia o código
    const copyText = document.getElementById("pixCode");
    copyText.select();
    document.execCommand("copy");
    alert("Chave Pix copiada! Seus dados foram registrados. Agora basta colar no seu banco.");
}

<div id="modalRegulamento" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; padding:20px; overflow-y:auto; box-sizing:border-box;">

            <p>1. Esta ação tem caráter estritamente promocional, cujo objetivo é

            <p>2. Participantes devem ser pessoas físicas, maiores de 18 anos, profissionais autônomos na área de abrangência. O direito ao "Número da Sorte" é conferido exclusivamente mediante a confirmação do pagamento da anuidade de R$ 79,00.</p>
            <p>3. A campanha visa atingir, no mínimo, 400 assinaturas. Após o alcance desta meta, será definida a data do sorteio baseada na extração da Loteria Federal. Os números são válidos apenas para assinaturas com pagamento processado e ativo.</p>
            <p>4. O número contemplado será obtido pela extração da Loteria Federal. Caso o número obtido exceda o total de participantes, aplica-se a busca sequencial ascendente até encontrar o primeiro número participante.</p>
            <p>5. O prêmio é 01 Motocicleta Honda Fan 125, a ser entregue em Itanhangá-MT. O ganhador, independentemente da cidade de residência, deverá retirar o prêmio obrigatoriamente neste município, sendo os custos de deslocamento de sua inteira responsabilidade.</p>
            <p>6. Exclusão: Serão automaticamente excluídos assinaturas estornadas ou canceladas. Fica eleito o foro de Tapurah-MT. Caso a Loteria Federal não ocorra, será utilizada a extração imediatamente posterior.</p>
            <p>7. *Cessão de Imagem: *Ao participar desta promoção, o usuário autoriza, de forma gratuita e definitiva, o uso de sua imagem, nome e voz, em fotos, vídeos e materiais publicitários vinculados ao AutônomoFácil, para fins de divulgação, sem direito a remuneração ou reivindicações de direito de imagem.</p>
