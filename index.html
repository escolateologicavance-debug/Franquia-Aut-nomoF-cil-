<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anuidade AutônomoFácil</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0b1a2e; 
            color: #fff; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }
        .container { 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
        }
        .flyer-img { 
            width: 100%; 
            border-radius: 15px; 
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .box { 
            background: #1a2f4a; 
            padding: 25px; 
            border-radius: 20px; 
            border: 1px solid #00ffcc;
        }
        h1 { font-size: 1.3rem; margin: 0; color: #fff; }
        .valor { font-size: 1.5rem; color: #00ffcc; font-weight: bold; margin: 10px 0 20px 0; }
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 8px 0; 
            border-radius: 10px; 
            border: none; 
            box-sizing: border-box; 
            background: #0b1a2e; 
            color: #fff;
        }
        button { 
            background: #00ffcc; 
            padding: 18px; 
            border: none; 
            border-radius: 10px; 
            width: 100%; 
            font-weight: bold; 
            font-size: 1.1rem; 
            color: #0b1a2e; 
            cursor: pointer; 
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="logo-192.png" alt="Flyer Oportunidade" class="flyer-img">

    <div class="box">
        <h1>Anuidade AutônomoFácil</h1>
        <p class="valor">Valor: R$ 79,00</p>
        
        <input type="text" id="nome" placeholder="Seu Nome Completo">
        <input type="tel" id="whatsapp" placeholder="Seu WhatsApp">
        <button onclick="alert('Conectando ao pagamento...')">PAGAR COM PIX</button>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
