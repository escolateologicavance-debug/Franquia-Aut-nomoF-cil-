<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anuidade AutônomoFácil</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0b1a2e; 
            color: #fff; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }
        .container { 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
        }
        .flyer-img { 
            width: 100%; 
            border-radius: 15px; 
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .box { 
            background: #1a2f4a; 
            padding: 25px; 
            border-radius: 20px; 
            border: 1px solid #00ffcc;
        }
        h1 { font-size: 1.3rem; margin: 0; color: #fff; }
        .valor { font-size: 1.5rem; color: #00ffcc; font-weight: bold; margin: 10px 0 20px 0; }
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 8px 0; 
            border-radius: 10px; 
            border: none; 
            box-sizing: border-box; 
            background: #0b1a2e; 
            color: #fff;
        }
        button { 
            background: #00ffcc; 
            padding: 18px; 
            border: none; 
            border-radius: 10px; 
            width: 100%; 
            font-weight: bold; 
            font-size: 1.1rem; 
            color: #0b1a2e; 
            cursor: pointer; 
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="logo-192.png" alt="Flyer Oportunidade" class="flyer-img">

    <div class="box">
        <h1>Anuidade AutônomoFácil</h1>
        <p class="valor">Valor: R$ 79,00</p>
        
        <input type="text" id="nome" placeholder="Seu Nome Completo">
        <input type="tel" id="whatsapp" placeholder="Seu WhatsApp">
        <button id="btnPagar">PAGAR COM PIX</button>
    </div>
</div>

<script>
    // Configurações do Supabase (URL base correta)
    const SUPABASE_URL = "https://xzhcujtqrfesfcfbpmsi.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6aGN1anRxcmZlc2ZjZmJwbXNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MzM1NDgsImV4cCI6MjA5NjEwOTU0OH0.eQS1iqV2WlJJfVkujk2y-b4mIDnnLzyFLpz4pOmjQeU";

    document.getElementById('btnPagar').addEventListener('click', async () => {
        const nome = document.getElementById('nome').value;
        const whatsapp = document.getElementById('whatsapp').value;

        if (!nome || !whatsapp) {
            alert("Por favor, preencha todos os campos.");
            return;
        }

        const btn = document.getElementById('btnPagar');
        btn.innerText = "Salvando...";
        btn.disabled = true;

        try {
            // URL montada corretamente com o caminho completo da API
            const response = await fetch(`${SUPABASE_URL}/rest/v1/pagamentos_sorteio`, {
                method: "POST",
                headers: {
                    "apikey": SUPABASE_KEY,
                    "Authorization": `Bearer ${SUPABASE_KEY}`,
                    "Content-Type": "application/json",
                    "Prefer": "return=representation"
                },
                body: JSON.stringify({
                    nome: nome,
                    whatsapp: whatsapp,
                    status: "Pendente"
                })
            });

            const data = await response.json();

            if (response.ok) {
                window.location.href = "https://mpago.la/2FzBW7K";
            } else {
                console.error("Erro do servidor:", data);
                throw new Error(data.message || "Erro ao salvar no banco.");
            }
        } catch (error) {
            alert("Erro: " + error.message);
            btn.innerText = "PAGAR COM PIX";
            btn.disabled = false;
        }
    });

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>

</body>
</html>
