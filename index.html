<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sorteio AutônomoFácil</title>
<style>
body { font-family: sans-serif; background: #0b1a2e; color: #fff; text-align: center; padding: 20px; }
.box { background: #1a2f4a; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
button { background: #00ffcc; padding: 15px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
#pixSection { display: none; margin-top: 20px; }
</style>
</head>
<body>

<div class="box">
<img src="1000377207.png" width="100">
<h1>Anuidade AutônomoFácil</h1>
<p>Valor: R$ 79,00</p>

<div id="formSection">
<input type="text" id="nome" placeholder="Seu Nome">
<input type="tel" id="whatsapp" placeholder="Seu WhatsApp">
<button onclick="gerarPagamento()">PAGAR COM PIX</button>
</div>

<div id="pixSection">
<p>Copie o código abaixo para pagar:</p>
<textarea id="copiaCola" readonly style="width: 100%; height: 80px;"></textarea>
<button onclick="copiarTexto()">COPIAR CÓDIGO PIX</button>
<p><small>Assim que pagar, seu número da sorte será enviado ao WhatsApp!</small></p>
</div>
</div>

<script>
async function gerarPagamento() {
const nome = document.getElementById('nome').value;
const whatsapp = document.getElementById('whatsapp').value;

// 1. Aqui você chamaria sua "Cloud Function" (ou n8n webhook)
// que comunica com o Mercado Pago.
const response = await fetch('URL_DO_SEU_WEBHOOK_N8N', {
method: 'POST',
body: JSON.stringify({ nome, whatsapp, valor: 79.00 })
});

const data = await response.json();

// 2. Exibe o código gerado pelo Mercado Pago
document.getElementById('copiaCola').value = data.pix_copia_cola;
document.getElementById('formSection').style.display = 'none';
document.getElementById('pixSection').style.display = 'block';
}

function copiarTexto() {
document.getElementById('copiaCola').select();
document.execCommand('copy');
alert('Código Pix copiado!');
}
</script>
</body>
</html>
